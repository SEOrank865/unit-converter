<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Universal Conversion Tool | Convert Length, Weight, Temperature & More</title>

<meta name="description" content="Free universal conversion calculator. Convert miles, kilometers, pounds, kilograms, Celsius, Fahrenheit, gallons, liters and more.">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f2f2f2;
}

header{
background:#1e4f2f;
color:white;
text-align:center;
padding:40px 20px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.section{
background:white;
padding:25px;
margin-bottom:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.ad{
background:#e9e9e9;
text-align:center;
padding:35px;
margin:20px 0;
font-size:14px;
color:#777;
border:2px dashed #ccc;
}

.converter{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#1e4f2f;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:15px;
font-weight:bold;
}

footer{
background:#1e4f2f;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<h1>Universal Conversion Tool</h1>
<p>Convert Units Instantly</p>
</header>

<div class="container">

<div class="ad">
TOP BANNER AD SPACE (728x90)
</div>

<div class="section">

<h2>Length Converter</h2>

<div class="converter">

<input id="lengthInput" type="number" placeholder="Enter value">

<select id="lengthFrom">
<option value="km">Kilometers</option>
<option value="miles">Miles</option>
<option value="meters">Meters</option>
</select>

<select id="lengthTo">
<option value="miles">Miles</option>
<option value="km">Kilometers</option>
<option value="meters">Meters</option>
</select>

<button onclick="convertLength()">Convert</button>

</div>

<div class="result" id="lengthResult"></div>

</div>

<div class="ad">
RECTANGLE AD SPACE (300x250)
</div>

<div class="section">

<h2>Weight Converter</h2>

<div class="converter">

<input id="weightInput" type="number">

<select id="weightFrom">
<option value="kg">Kilograms</option>
<option value="lb">Pounds</option>
</select>

<select id="weightTo">
<option value="lb">Pounds</option>
<option value="kg">Kilograms</option>
</select>

<button onclick="convertWeight()">Convert</button>

</div>

<div class="result" id="weightResult"></div>

</div>

<div class="ad">
IN-CONTENT AD SPACE
</div>

<div class="section">

<h2>Temperature Converter</h2>

<div class="converter">

<input id="tempInput" type="number">

<select id="tempFrom">
<option value="C">Celsius</option>
<option value="F">Fahrenheit</option>
</select>

<select id="tempTo">
<option value="F">Fahrenheit</option>
<option value="C">Celsius</option>
</select>

<button onclick="convertTemp()">Convert</button>

</div>

<div class="result" id="tempResult"></div>

</div>

<div class="ad">
BOTTOM BANNER AD SPACE
</div>

</div>

<footer>

<p>© 2026 Universal Conversion Tool</p>
<p>Free unit conversions for everyday calculations.</p>

</footer>

<script>

function convertLength(){

let val=parseFloat(document.getElementById("lengthInput").value)

let from=document.getElementById("lengthFrom").value
let to=document.getElementById("lengthTo").value

let meters

if(from==="km") meters=val*1000
if(from==="miles") meters=val*1609.34
if(from==="meters") meters=val

let result

if(to==="km") result=meters/1000
if(to==="miles") result=meters/1609.34
if(to==="meters") result=meters

document.getElementById("lengthResult").innerText="Result: "+result

}

function convertWeight(){

let val=parseFloat(document.getElementById("weightInput").value)

let from=document.getElementById("weightFrom").value
let to=document.getElementById("weightTo").value

let kg

if(from==="kg") kg=val
if(from==="lb") kg=val*0.453592

let result

if(to==="kg") result=kg
if(to==="lb") result=kg/0.453592

document.getElementById("weightResult").innerText="Result: "+result

}

function convertTemp(){

let val=parseFloat(document.getElementById("tempInput").value)

let from=document.getElementById("tempFrom").value
let to=document.getElementById("tempTo").value

let result

if(from==="C" && to==="F") result=(val*9/5)+32
if(from==="F" && to==="C") result=(val-32)*5/9
if(from===to) result=val

document.getElementById("tempResult").innerText="Result: "+result

}

</script>

</body>
</html>
